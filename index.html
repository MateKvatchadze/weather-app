<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>weather app</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h2>weather app</h2>

  <form id="searchForm">
    <input type="search" id="cityInput" placeholder="Enter city" name="city">
    <button type="submit">Search</button>
  </form><br><br>

  <div id="weatherResult">
    <h2 id="cityName"></h2>
    <img id="weatherIcon">
    <p id="temperature"></p>
    <p id="description"></p>
    <p id="errorMessage"></p>
    <p id="loadingMessage"></p>
    <p id="humidity"></p>
    <p id="windSpeed"></p>
  </div>








  <script src="index.js"></script>
</body>

</html>
